# .github/workflows/ci.yml
name: Med-Core DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # STAGE 1: THE PROVING GROUNDS (CI)
  # ==========================================
  security-and-testing:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: local_dev_password_change_me
          POSTGRES_DB: medcore_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pytest pytest-asyncio httpx

    - name: Run Bandit SAST Scan
      run: bandit -r app/

    - name: Run Async Pytest Engine
      # DEVSECOPS PRINCIPLE: Strictly dummy values for isolated testing.
      # Never expose ${{ secrets }} in the test runner.
      env:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: local_dev_password_change_me
        POSTGRES_DB: medcore_db
        POSTGRES_HOST: localhost  
        POSTGRES_PORT: 5432
        SECRET_KEY: super_secret_github_actions_key
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 30
        ENCRYPTION_KEY: "cw_0x689RpI-jtRR7oE8h_eQsKImvJapLeSbXpwF4e4="
        ENCRYPTION_KEYS: '{"1": "cw_0x689RpI-jtRR7oE8h_eQsKImvJapLeSbXpwF4e4="}'
        ENCRYPTION_KEY_CURRENT_VERSION: 1
        REDIS_URL: redis://localhost:6379/0
        TEST_DATABASE_URL: postgresql+asyncpg://admin:local_dev_password_change_me@localhost:5432/medcore_test_db
      run: |
        pytest -v

  # ==========================================
  # STAGE 2: THE ZERO-TRUST AZURE DEPLOYMENT (CD)
  # ==========================================
  deploy-to-azure:
    needs: security-and-testing 
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: read
      packages: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python for Database Migrations
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Execute Zero-Downtime Database Migration
      env:
        # Inject production DB secret so Alembic can align the schema before the code deploys
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        alembic upgrade head

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Immutable Image
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME=ghcr.io/$REPO_LOWER/medcore-api:latest
        
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME

    - name: Azure OIDC Federation Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy Container to Azure Environment
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME=ghcr.io/$REPO_LOWER/medcore-api:latest
        
        # Injecting 100% of state dynamically from GitHub Secrets
        az containerapp update \
          --name medcore-api \
          --resource-group medcore-prod-swiss-rg \
          --image $IMAGE_NAME \
          --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                         SECRET_KEY="${{ secrets.PROD_SECRET_KEY }}" \
                         REDIS_URL="${{ secrets.REDIS_URL }}" \
                         ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
                         APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
                         DB_MAX_OVERFLOW="${{ secrets.DB_MAX_OVERFLOW }}" \
                         DB_POOL_SIZE="${{ secrets.DB_POOL_SIZE }}" \
                         DB_POOL_TIMEOUT="${{ secrets.DB_POOL_TIMEOUT }}" \
                         ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
                         ENCRYPTION_KEYS="${{ secrets.ENCRYPTION_KEYS }}" \
                         ENCRYPTION_KEY_CURRENT_VERSION="${{ secrets.ENCRYPTION_KEY_CURRENT_VERSION }}"